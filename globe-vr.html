<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MXGenius Fleet Globe VR</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #050914; color: #eaf7ff; font-family: system-ui, sans-serif; }
    canvas { display: block; width: 100%; height: 100%; }
    .hud { position: fixed; top: 14px; left: 14px; z-index: 4; padding: 11px 13px; border: 1px solid rgba(34,211,238,.38); border-radius: 9px; background: rgba(5,9,20,.86); }
    .hud strong { display: block; color: #67e8f9; font-size: 14px; }
    .hud span { display: block; margin-top: 3px; color: #9db1c6; font: 12px/1.4 ui-monospace, monospace; }
    .back { position: fixed; top: 14px; right: 14px; z-index: 4; padding: 9px 13px; border: 1px solid #31465d; border-radius: 7px; background: #0b1524; color: #d9edff; text-decoration: none; font-size: 13px; }
    #XRButton { opacity: 1 !important; border-color: #22d3ee !important; background: rgba(4,40,56,.9) !important; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
    }
  }
  </script>
  <script src="runtime-config.js?v=3"></script>
  <script src="cache.js"></script>
  <script src="application-client.js?v=6"></script>
  <script src="realtime-client.js?v=2"></script>
</head>
<body>
  <div class="hud">
    <strong>MXGenius Fleet Globe</strong>
    <span id="fleetStatus">Preparing mapped fleet…</span>
  </div>
  <a class="back" href="dashboard.html">Back to dashboard</a>

  <script type="module">
    import * as THREE from 'three';
    import { XRButton } from 'three/addons/webxr/XRButton.js';
    import { XRRealtimePresence } from './xr-realtime-presence.js?v=1';

    const status = document.getElementById('fleetStatus');
    let fleet = { totalAircraft: 0, mappedAircraft: 0, clusters: [] };
    try {
      fleet = JSON.parse(localStorage.getItem('mxg_globe_vr_data') || 'null') || fleet;
    } catch (error) {
      console.warn('Unable to read cached fleet globe data', error);
    }

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.05, 50);
    camera.position.set(0, 1.6, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setClearColor(0x000000, 0);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(XRButton.createButton(renderer, { optionalFeatures: ['hand-tracking'] }));
    const xrVoice = new XRRealtimePresence({
      onAction: (action, input, target) => window.dispatchEvent(new CustomEvent('mxgenius:xr-action', {
        detail: { action, input, target, context: { surface: 'fleet-globe' } }
      }))
    });
    scene.add(xrVoice.group);
    const TOKEN = 'LIVE_TOKEN';

    const globeGroup = new THREE.Group();
    globeGroup.position.set(0, 1.55, -1.75);
    scene.add(globeGroup);

    const texture = new THREE.TextureLoader().load('earth-blue-marble.jpg');
    texture.colorSpace = THREE.SRGBColorSpace;
    const globe = new THREE.Mesh(
      new THREE.SphereGeometry(0.68, 64, 40),
      new THREE.MeshStandardMaterial({ map: texture, roughness: 0.82, metalness: 0.02 })
    );
    globeGroup.add(globe);

    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.705, 48, 32),
      new THREE.MeshBasicMaterial({ color: 0x22d3ee, transparent: true, opacity: 0.08, side: THREE.BackSide })
    );
    globeGroup.add(atmosphere);

    const markerGeometry = new THREE.CircleGeometry(0.011, 18);
    const markerMaterial = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      side: THREE.DoubleSide,
      depthWrite: false,
      polygonOffset: true,
      polygonOffsetFactor: -1
    });
    const markers = new THREE.InstancedMesh(markerGeometry, markerMaterial, fleet.clusters.length);
    const marker = new THREE.Object3D();
    const color = new THREE.Color();
    const markerPositions = [];

    function pointOnGlobe(lat, lng, radius = 0.697) {
      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lng + 180);
      return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    function markerColor(cluster) {
      if (cluster.hasActiveCase) return 0x00d4ff;
      if (cluster.hasAog || cluster.hasVeryHighTime) return 0xff4444;
      if (cluster.hasHighTime) return 0xf59e0b;
      return 0x10b981;
    }

    fleet.clusters.forEach((cluster, index) => {
      const position = pointOnGlobe(Number(cluster.lat), Number(cluster.lng));
      markerPositions.push(position.clone());
      marker.position.copy(position);
      marker.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), position.clone().normalize());
      const scale = Math.min(1.75, 0.72 + Math.log2(Math.max(1, Number(cluster.count)) + 1) * 0.13 + (cluster.hasActiveCase || cluster.hasAog ? 0.12 : 0));
      marker.scale.setScalar(scale);
      marker.updateMatrix();
      markers.setMatrixAt(index, marker.matrix);
      markers.setColorAt(index, color.setHex(markerColor(cluster)));
    });
    markers.instanceMatrix.needsUpdate = true;
    if (markers.instanceColor) markers.instanceColor.needsUpdate = true;
    globeGroup.add(markers);

    const detailsCanvas = document.createElement('canvas');
    detailsCanvas.width = 1024;
    detailsCanvas.height = 1280;
    const detailsContext = detailsCanvas.getContext('2d');
    const detailsTexture = new THREE.CanvasTexture(detailsCanvas);
    detailsTexture.colorSpace = THREE.SRGBColorSpace;
    const detailsPanel = new THREE.Group();
    detailsPanel.name = 'FleetAircraftDetails';
    detailsPanel.position.set(0.95, 1.48, -1.5);
    detailsPanel.rotation.y = -0.22;
    detailsPanel.scale.setScalar(0.001);
    detailsPanel.visible = false;
    const detailsSurface = new THREE.Mesh(
      new THREE.PlaneGeometry(0.72, 0.9),
      new THREE.MeshBasicMaterial({ map: detailsTexture, transparent: true, toneMapped: false, side: THREE.DoubleSide })
    );
    detailsPanel.add(detailsSurface);
    const detailImageGrid = new THREE.Group();
    detailImageGrid.name = 'JetNetImageGrid';
    detailImageGrid.visible = false;
    detailsPanel.add(detailImageGrid);
    scene.add(detailsPanel);

    let detailsTarget = 0;
    let selectedClusterIndex = -1;
    let selectedCluster = null;
    let panelMode = 'wrist';
    let panelView = 'location';
    let listPage = 0;
    let detailPage = 0;
    let imagePage = 0;
    let detailModel = null;
    let panelHitRegions = [];
    let imageGridGeneration = 0;
    let leftHand = null;
    let leftController = null;
    let rightHand = null;
    let rightController = null;
    const panelWorldPosition = new THREE.Vector3(0.95, 1.48, -1.5);
    const panelWorldQuaternion = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, -0.22, 0));
    const panelCameraPosition = new THREE.Vector3();

    function cleanText(value, fallback = '—') {
      const text = String(value ?? '').trim();
      return text || fallback;
    }

    function fitText(text, max = 44) {
      const value = cleanText(text);
      return value.length > max ? `${value.slice(0, max - 1)}…` : value;
    }

    function addHitRegion(x, y, width, height, action) {
      panelHitRegions.push({ x, y, width, height, action });
    }

    function drawPanelFrame(title, subtitle = '') {
      panelHitRegions = [];
      detailsContext.clearRect(0, 0, detailsCanvas.width, detailsCanvas.height);
      detailsContext.fillStyle = 'rgba(7, 17, 31, 0.98)';
      detailsContext.fillRect(0, 0, detailsCanvas.width, detailsCanvas.height);
      detailsContext.strokeStyle = '#22d3ee';
      detailsContext.lineWidth = 6;
      detailsContext.strokeRect(3, 3, detailsCanvas.width - 6, detailsCanvas.height - 6);
      detailsContext.fillStyle = '#67e8f9';
      detailsContext.font = '600 28px ui-monospace, monospace';
      detailsContext.fillText(title, 44, 62);
      if (subtitle) {
        detailsContext.fillStyle = '#8fa8bc';
        detailsContext.font = '25px system-ui, sans-serif';
        detailsContext.fillText(fitText(subtitle, 58), 44, 102);
      }
      detailsContext.fillStyle = '#123047';
      detailsContext.fillRect(754, 24, 226, 64);
      detailsContext.strokeStyle = '#2d6077';
      detailsContext.strokeRect(754, 24, 226, 64);
      detailsContext.fillStyle = '#dff7ff';
      detailsContext.font = '600 25px system-ui, sans-serif';
      detailsContext.textAlign = 'center';
      detailsContext.fillText(panelMode === 'wrist' ? 'PIN IN WORLD' : 'FOLLOW WRIST', 867, 65);
      detailsContext.textAlign = 'left';
      addHitRegion(754, 24, 226, 64, { type: 'toggle-panel-mode' });
    }

    function drawButton(x, y, width, label, action) {
      detailsContext.fillStyle = '#10283a';
      detailsContext.fillRect(x, y, width, 64);
      detailsContext.strokeStyle = '#2d6077';
      detailsContext.strokeRect(x, y, width, 64);
      detailsContext.fillStyle = '#dff7ff';
      detailsContext.font = '600 24px system-ui, sans-serif';
      detailsContext.textAlign = 'center';
      detailsContext.fillText(label, x + width / 2, y + 41);
      detailsContext.textAlign = 'left';
      addHitRegion(x, y, width, 64, action);
    }

    function drawLocationDetails(cluster) {
      panelView = 'location';
      const aircraft = Array.isArray(cluster.aircraft) ? cluster.aircraft : [];
      const pageSize = 8;
      const pageCount = Math.max(1, Math.ceil(aircraft.length / pageSize));
      listPage = THREE.MathUtils.clamp(listPage, 0, pageCount - 1);
      const rows = aircraft.slice(listPage * pageSize, (listPage + 1) * pageSize);
      const place = [cluster.city, cluster.country].filter(Boolean).join(', ');
      drawPanelFrame('FLEET LOCATION', place);
      detailsContext.fillStyle = '#f4fbff';
      detailsContext.font = '700 72px system-ui, sans-serif';
      detailsContext.fillText(cleanText(cluster.icao, 'UNKNOWN'), 42, 188);
      detailsContext.fillStyle = '#8fa8bc';
      detailsContext.font = '27px system-ui, sans-serif';
      detailsContext.fillText(`${aircraft.length.toLocaleString()} aircraft · select a record for JetNet details`, 44, 232);

      rows.forEach((aircraftRecord, rowIndex) => {
        const y = 270 + rowIndex * 104;
        detailsContext.fillStyle = rowIndex % 2 ? '#0b1928' : '#0e2031';
        detailsContext.fillRect(36, y, 952, 90);
        detailsContext.fillStyle = '#eaf7ff';
        detailsContext.font = '700 32px ui-monospace, monospace';
        detailsContext.fillText(fitText(aircraftRecord.regnbr, 12), 56, y + 38);
        detailsContext.fillStyle = '#b8cddd';
        detailsContext.font = '25px system-ui, sans-serif';
        detailsContext.fillText(fitText([aircraftRecord.make, aircraftRecord.model].filter(Boolean).join(' '), 40), 250, y + 36);
        detailsContext.fillStyle = '#718da3';
        detailsContext.font = '22px system-ui, sans-serif';
        detailsContext.fillText(fitText(aircraftRecord.owner, 46), 250, y + 69);
        detailsContext.fillStyle = aircraftRecord.urgency === 'AOG' ? '#fb7185' : aircraftRecord.urgency === 'Other' ? '#34d399' : '#fbbf24';
        detailsContext.font = '600 21px ui-monospace, monospace';
        detailsContext.textAlign = 'right';
        detailsContext.fillText(cleanText(aircraftRecord.urgency), 956, y + 53);
        detailsContext.textAlign = 'left';
        addHitRegion(36, y, 952, 90, { type: 'open-aircraft', aircraft: aircraftRecord });
      });

      if (!rows.length) {
        detailsContext.fillStyle = '#8fa8bc';
        detailsContext.font = '28px system-ui, sans-serif';
        detailsContext.fillText('No aircraft records were cached for this location.', 44, 340);
      }
      drawButton(36, 1190, 170, 'PREVIOUS', { type: 'list-page', delta: -1 });
      detailsContext.fillStyle = '#718da3';
      detailsContext.font = '23px ui-monospace, monospace';
      detailsContext.textAlign = 'center';
      detailsContext.fillText(`${listPage + 1} / ${pageCount}`, 512, 1231);
      detailsContext.textAlign = 'left';
      drawButton(818, 1190, 170, 'NEXT', { type: 'list-page', delta: 1 });
      detailsTexture.needsUpdate = true;
    }

    function buildDetailModel(bundle, summary) {
      const aircraft = bundle?.aircraft?.aircraft || {};
      const ident = aircraft.identification || {};
      const airframe = aircraft.airframe || {};
      const maintenance = aircraft.maintenance || {};
      const apu = aircraft.apu || {};
      const engines = bundle?.engines?.engines || [];
      const sections = [
        ['Identification', [
          ['Aircraft ID', ident.aircraftid], ['Serial Number', ident.sernbr], ['Year Manufactured', ident.yearmfg],
          ['Year Delivered', ident.yeardlv], ['Category/Size', ident.categorysize], ['Purchase Date', ident.purchasedate],
          ['Reg Expires', ident.regnbrexpires]
        ]],
        ['Base Location', [
          ['Airport', ident.baseairport], ['ICAO', ident.baseicao], ['IATA', ident.baseiata], ['City', ident.basecity],
          ['State', ident.basestate], ['Country', ident.basecountry]
        ]],
        ['Airframe', [
          ['AFTT', airframe.aftt], ['Landings', airframe.landings], ['Est AFTT', airframe.estaftt], ['As of Date', airframe.timesasofdate]
        ]],
        ['Engines', engines.flatMap((engine, index) => [
          [`Engine ${engine.position || index + 1}`, [engine.engine_make, engine.engine_model].filter(Boolean).join(' ')],
          ['Serial', engine.serial_number], ['Total Time', engine.tsn], ['Cycles', engine.csn], ['Overhaul (TSO)', engine.tso], ['Program', engine.program]
        ])],
        ['APU', [['Model', apu.model], ['Serial', apu.sernbr], ['TTSNEW', apu.ttsnew], ['SOH', apu.soh], ['Program', apu.maintenanceprogram]]],
        ['Maintenance', [
          ['Maintained', maintenance.maintained], ['AF Program', maintenance.airframemaintenanceprogram],
          ['Tracking', maintenance.airframetrackingprogram], ['MTOW', maintenance.weightscapacity],
          ['Certifications', (maintenance.certifications || []).join(', ')]
        ]],
        ['Avionics', (aircraft.avionics || []).map((item) => ['System', item.name])],
        ['Company Relationships', (aircraft.companyrelationships || []).map((item) => [item.relationtype || 'Company', item.name])],
        ['Flight Activity', (aircraft.flights || []).map((item) => [`${item.flightyear || ''} ${item.flightmonth || ''}`.trim(), `${item.flights || '—'} flights · ${item.flighthours || '—'} hours`])],
        ['Interior', (aircraft.interior || []).map((item) => [item.name, item.description])],
        ['Exterior', (aircraft.exterior || []).map((item) => [item.name, item.description])]
      ];
      const lines = [];
      sections.forEach(([title, rows]) => {
        const availableRows = rows.filter(([, value]) => value !== undefined && value !== null && String(value).trim());
        if (!availableRows.length) return;
        lines.push({ type: 'section', text: title });
        availableRows.forEach(([label, value]) => lines.push({ type: 'row', label, value }));
      });
      return {
        make: ident.make || summary.make,
        model: ident.model || summary.model,
        registration: ident.regnbr || summary.regnbr,
        pictures: (bundle?.pictures?.pictures || []).map((picture) => picture.pictureurl).filter((url) => /^https?:\/\//i.test(String(url))),
        lines
      };
    }

    function clearDetailImageGrid() {
      imageGridGeneration += 1;
      detailImageGrid.visible = false;
      while (detailImageGrid.children.length) {
        const child = detailImageGrid.children[0];
        detailImageGrid.remove(child);
        child.geometry?.dispose();
        const materials = Array.isArray(child.material) ? child.material : [child.material];
        materials.forEach((material) => {
          material?.map?.dispose();
          material?.dispose();
        });
      }
    }

    function populateDetailImageGrid(urls) {
      clearDetailImageGrid();
      const generation = imageGridGeneration;
      const pageCount = Math.max(1, Math.ceil(urls.length / 6));
      imagePage = THREE.MathUtils.clamp(imagePage, 0, pageCount - 1);
      const sources = urls.slice(imagePage * 6, (imagePage + 1) * 6)
        .map((url) => MXApplicationClient.aircraftImageUrl(url))
        .filter(Boolean);
      if (!sources.length) return;
      detailImageGrid.visible = true;
      sources.forEach((url, index) => {
        const column = index % 3;
        const row = Math.floor(index / 3);
        const material = new THREE.MeshBasicMaterial({ color: 0x13283a, toneMapped: false, side: THREE.DoubleSide });
        const image = new THREE.Mesh(new THREE.PlaneGeometry(0.21, 0.135), material);
        image.position.set(-0.24 + column * 0.24, 0.66 - row * 0.16, 0.018);
        detailImageGrid.add(image);
        new THREE.TextureLoader().load(url, (texture) => {
          if (generation !== imageGridGeneration || !image.parent) {
            texture.dispose();
            return;
          }
          texture.colorSpace = THREE.SRGBColorSpace;
          material.map = texture;
          material.color.setHex(0xffffff);
          material.needsUpdate = true;
        }, undefined, () => {
          material.color.setHex(0x3a1720);
        });
      });
    }

    function drawAircraftDetails() {
      if (!detailModel) return;
      panelView = 'aircraft';
      const pageSize = 13;
      const pageCount = Math.max(1, Math.ceil(detailModel.lines.length / pageSize));
      detailPage = THREE.MathUtils.clamp(detailPage, 0, pageCount - 1);
      drawPanelFrame('JETNET AIRCRAFT', `${cleanText(detailModel.make)} ${cleanText(detailModel.model)}`);
      drawButton(36, 122, 150, 'BACK', { type: 'back-to-location' });
      detailsContext.fillStyle = '#f4fbff';
      detailsContext.font = '700 52px ui-monospace, monospace';
      detailsContext.fillText(cleanText(detailModel.registration), 220, 167);

      const imagePageCount = Math.max(1, Math.ceil(detailModel.pictures.length / 6));
      if (detailModel.pictures.length) {
        drawButton(650, 122, 150, 'IMG PREV', { type: 'image-page', delta: -1 });
        drawButton(838, 122, 150, 'IMG NEXT', { type: 'image-page', delta: 1 });
        detailsContext.fillStyle = '#718da3';
        detailsContext.font = '20px ui-monospace, monospace';
        detailsContext.textAlign = 'right';
        detailsContext.fillText(`IMAGES ${imagePage + 1} / ${imagePageCount} · ${detailModel.pictures.length} TOTAL`, 988, 211);
        detailsContext.textAlign = 'left';
      }

      const contentTop = 232;

      const visibleLines = detailModel.lines.slice(detailPage * pageSize, (detailPage + 1) * pageSize);
      visibleLines.forEach((line, index) => {
        const y = contentTop + index * 50;
        if (line.type === 'section') {
          detailsContext.fillStyle = '#67e8f9';
          detailsContext.font = '600 25px ui-monospace, monospace';
          detailsContext.fillText(line.text.toUpperCase(), 44, y + 32);
          return;
        }
        detailsContext.fillStyle = '#8fa8bc';
        detailsContext.font = '23px system-ui, sans-serif';
        detailsContext.fillText(fitText(line.label, 24), 58, y + 31);
        detailsContext.fillStyle = '#eaf7ff';
        detailsContext.textAlign = 'right';
        detailsContext.fillText(fitText(line.value, 45), 970, y + 31);
        detailsContext.textAlign = 'left';
      });
      drawButton(36, 1190, 170, 'PREVIOUS', { type: 'detail-page', delta: -1 });
      detailsContext.fillStyle = '#718da3';
      detailsContext.font = '23px ui-monospace, monospace';
      detailsContext.textAlign = 'center';
      detailsContext.fillText(`${detailPage + 1} / ${pageCount}`, 512, 1231);
      detailsContext.textAlign = 'left';
      drawButton(818, 1190, 170, 'NEXT', { type: 'detail-page', delta: 1 });
      detailsTexture.needsUpdate = true;
    }

    async function openAircraftDetails(summary) {
      drawPanelFrame('JETNET AIRCRAFT', 'Retrieving aircraft, gallery, and engine records…');
      detailsTexture.needsUpdate = true;
      try {
        const bundle = await MXApplicationClient.aircraftBundle({ id: summary.aircraftid, token: TOKEN });
        detailModel = buildDetailModel(bundle, summary);
        detailPage = 0;
        imagePage = 0;
        populateDetailImageGrid(detailModel.pictures);
        drawAircraftDetails();
      } catch (error) {
        drawPanelFrame('JETNET AIRCRAFT', 'Aircraft details are temporarily unavailable.');
        drawButton(36, 122, 150, 'BACK', { type: 'back-to-location' });
        detailsContext.fillStyle = '#fb7185';
        detailsContext.font = '26px system-ui, sans-serif';
        detailsContext.fillText(fitText(error?.message || 'Fleet source request failed', 64), 44, 250);
        detailsTexture.needsUpdate = true;
      }
    }

    function setPanelMode(mode) {
      panelMode = mode === 'world' ? 'world' : 'wrist';
      if (panelMode === 'world') {
        scene.attach(detailsPanel);
      }
      if (panelView === 'aircraft') drawAircraftDetails();
      else if (selectedCluster) drawLocationDetails(selectedCluster);
    }

    function handlePanelAction(action) {
      if (!action) return;
      if (action.type === 'toggle-panel-mode') return setPanelMode(panelMode === 'wrist' ? 'world' : 'wrist');
      if (action.type === 'open-aircraft') return openAircraftDetails(action.aircraft);
      if (action.type === 'back-to-location') {
        clearDetailImageGrid();
        detailModel = null;
        return drawLocationDetails(selectedCluster);
      }
      if (action.type === 'list-page') {
        listPage += action.delta;
        return drawLocationDetails(selectedCluster);
      }
      if (action.type === 'detail-page') {
        detailPage += action.delta;
        return drawAircraftDetails();
      }
      if (action.type === 'image-page') {
        const pageCount = Math.max(1, Math.ceil((detailModel?.pictures.length || 0) / 6));
        imagePage = THREE.MathUtils.clamp(imagePage + action.delta, 0, pageCount - 1);
        populateDetailImageGrid(detailModel?.pictures || []);
        return drawAircraftDetails();
      }
    }

    function handlePanelUv(uv) {
      const x = uv.x * detailsCanvas.width;
      const y = (1 - uv.y) * detailsCanvas.height;
      const region = panelHitRegions.find((item) => x >= item.x && x <= item.x + item.width && y >= item.y && y <= item.y + item.height);
      if (region) handlePanelAction(region.action);
      return Boolean(region);
    }

    function openLocationDetails(cluster, index) {
      if (selectedClusterIndex >= 0) {
        markers.setColorAt(selectedClusterIndex, color.setHex(markerColor(fleet.clusters[selectedClusterIndex])));
      }
      selectedClusterIndex = index;
      selectedCluster = cluster;
      listPage = 0;
      detailModel = null;
      clearDetailImageGrid();
      markers.setColorAt(index, color.setHex(0xffffff));
      if (markers.instanceColor) markers.instanceColor.needsUpdate = true;
      drawLocationDetails(cluster);
      detailsPanel.visible = true;
      detailsTarget = 1;
    }

    function updatePanelAnchor() {
      if (panelMode !== 'wrist' || !renderer.xr.isPresenting) return;
      const wrist = leftHand?.joints?.wrist;
      const anchor = wrist?.visible ? wrist : leftController;
      if (!anchor) return;
      if (detailsPanel.parent !== anchor) anchor.attach(detailsPanel);
      detailsPanel.position.set(0.12, 0.11, -0.08);
      camera.getWorldPosition(panelCameraPosition);
      detailsPanel.lookAt(panelCameraPosition);
    }

    function updateDetailsPresentation(delta) {
      updatePanelAnchor();
      const blend = 1 - Math.exp(-12 * Math.max(0, delta));
      const nextScale = THREE.MathUtils.lerp(detailsPanel.scale.x, detailsTarget, blend);
      detailsPanel.scale.setScalar(Math.max(0.001, nextScale));
      if (detailsTarget === 0 && nextScale < 0.012) detailsPanel.visible = false;
    }

    const rotateCanvas = document.createElement('canvas');
    rotateCanvas.width = 384;
    rotateCanvas.height = 160;
    const rotateContext = rotateCanvas.getContext('2d');
    const rotateTexture = new THREE.CanvasTexture(rotateCanvas);
    rotateTexture.colorSpace = THREE.SRGBColorSpace;
    const rotateButton = new THREE.Mesh(
      new THREE.PlaneGeometry(0.27, 0.1125),
      new THREE.MeshBasicMaterial({ map: rotateTexture, transparent: true, toneMapped: false, side: THREE.DoubleSide })
    );
    rotateButton.name = 'FleetRotationToggle';
    scene.add(rotateButton);
    let rotationEnabled = true;

    function drawRotationButton() {
      rotateContext.clearRect(0, 0, rotateCanvas.width, rotateCanvas.height);
      rotateContext.fillStyle = 'rgba(8, 24, 38, 0.96)';
      rotateContext.fillRect(4, 4, 376, 152);
      rotateContext.strokeStyle = rotationEnabled ? '#22d3ee' : '#526a7c';
      rotateContext.lineWidth = 6;
      rotateContext.strokeRect(4, 4, 376, 152);
      rotateContext.fillStyle = '#eaf7ff';
      rotateContext.font = '600 38px system-ui, sans-serif';
      rotateContext.textAlign = 'center';
      rotateContext.fillText(rotationEnabled ? 'PAUSE ROTATION' : 'START ROTATION', 192, 96);
      rotateTexture.needsUpdate = true;
    }

    function toggleGlobeRotation(input) {
      rotationEnabled = !rotationEnabled;
      drawRotationButton();
      status.textContent = `${rotationEnabled ? 'Globe rotation started' : 'Globe rotation paused'} · ${input}`;
    }

    drawRotationButton();

    const xrRaycaster = new THREE.Raycaster();
    const xrHands = [];
    const xrControllers = [];
    const xrActiveGrips = new Map();
    let xrGlobeGesture = null;
    const fingerTargets = new Map();
    const voiceFingerTargets = new Map();
    const fingerPoint = new THREE.Vector3();
    const markerWorldPoint = new THREE.Vector3();
    const panelLocalPoint = new THREE.Vector3();
    const rotateLocalPoint = new THREE.Vector3();
    const gesturePointA = new THREE.Vector3();
    const gesturePointB = new THREE.Vector3();
    const gestureMidpoint = new THREE.Vector3();
    const rotateButtonOffset = new THREE.Vector3();
    let lastFingerCheck = 0;
    const panelFingerTargets = new Map();
    const rotateFingerTargets = new Map();

    function activateCluster(index, input) {
      const cluster = fleet.clusters[index];
      if (!cluster) return;
      const detail = {
        action: 'open-fleet-location',
        input,
        target: {
          index,
          icao: cluster.icao,
          city: cluster.city || '',
          country: cluster.country || '',
          count: Number(cluster.count) || 0,
          hasActiveCase: Boolean(cluster.hasActiveCase),
          hasAog: Boolean(cluster.hasAog),
          hasVeryHighTime: Boolean(cluster.hasVeryHighTime),
          hasHighTime: Boolean(cluster.hasHighTime)
        }
      };
      openLocationDetails(cluster, index);
      window.dispatchEvent(new CustomEvent('mxgenius:xr-action', { detail }));
      localStorage.setItem('mxg_globe_xr_selection', JSON.stringify(detail.target));
      status.textContent = `${detail.target.icao} · ${detail.target.count.toLocaleString()} aircraft · ${input}`;
    }

    function setupController(index) {
      const controller = renderer.xr.getController(index);
      const grip = renderer.xr.getControllerGrip(index);
      const rayGeometry = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 0, -1)
      ]);
      controller.add(new THREE.Line(rayGeometry, new THREE.LineBasicMaterial({ color: 0x67e8f9 })));
      controller.addEventListener('connected', (event) => {
        controller.userData.handedness = event.data?.handedness || '';
        grip.userData.handedness = controller.userData.handedness;
        if (controller.userData.handedness === 'left') leftController = grip;
        if (controller.userData.handedness === 'right') rightController = grip;
      });
      controller.addEventListener('select', () => {
        xrRaycaster.setFromXRController(controller);
        const uiHit = xrRaycaster.intersectObjects([
          ...xrVoice.interactiveObjects(),
          detailsSurface,
          rotateButton
        ], false)[0];
        if (uiHit && xrVoice.handleObject(uiHit.object, `controller-${index}`)) return;
        if (uiHit?.object === detailsSurface && detailsPanel.visible && uiHit.uv && handlePanelUv(uiHit.uv)) return;
        if (uiHit?.object === rotateButton) return toggleGlobeRotation(`controller-${index}`);
        const hit = xrRaycaster.intersectObject(markers, false)[0];
        if (hit?.instanceId !== undefined) activateCluster(hit.instanceId, `controller-${index}`);
      });
      controller.addEventListener('squeezestart', () => {
        xrActiveGrips.set(index, controller);
        captureGlobeGesture();
      });
      controller.addEventListener('squeezeend', () => {
        xrActiveGrips.delete(index);
        captureGlobeGesture();
      });
      scene.add(controller);
      scene.add(grip);
      xrControllers.push(controller);
    }

    function setupHand(index) {
      const hand = renderer.xr.getHand(index);
      hand.addEventListener('connected', (event) => {
        hand.userData.handedness = event.data?.handedness || '';
        if (hand.userData.handedness === 'left') leftHand = hand;
        if (hand.userData.handedness === 'right') rightHand = hand;
      });
      xrHands.push(hand);
      scene.add(hand);
    }

    function captureGlobeGesture() {
      const controllers = [...xrActiveGrips.values()];
      if (!renderer.xr.isPresenting || !controllers.length) {
        xrGlobeGesture = null;
        return;
      }
      if (controllers.length === 1) {
        controllers[0].getWorldPosition(gesturePointA);
        xrGlobeGesture = {
          mode: 'move',
          controller: controllers[0],
          controllerPosition: gesturePointA.clone(),
          globePosition: globeGroup.position.clone()
        };
        return;
      }
      controllers[0].getWorldPosition(gesturePointA);
      controllers[1].getWorldPosition(gesturePointB);
      xrGlobeGesture = {
        mode: 'scale',
        controllers: controllers.slice(0, 2),
        midpoint: gesturePointA.clone().add(gesturePointB).multiplyScalar(0.5),
        distance: Math.max(0.001, gesturePointA.distanceTo(gesturePointB)),
        globePosition: globeGroup.position.clone(),
        globeScale: globeGroup.scale.clone()
      };
    }

    function updateGlobeGesture() {
      if (!xrGlobeGesture || !renderer.xr.isPresenting) return;
      if (xrGlobeGesture.mode === 'move') {
        xrGlobeGesture.controller.getWorldPosition(gesturePointA);
        globeGroup.position.copy(xrGlobeGesture.globePosition).add(gesturePointA.sub(xrGlobeGesture.controllerPosition));
        return;
      }
      const [first, second] = xrGlobeGesture.controllers;
      first.getWorldPosition(gesturePointA);
      second.getWorldPosition(gesturePointB);
      gestureMidpoint.copy(gesturePointA).add(gesturePointB).multiplyScalar(0.5);
      const scaleFactor = THREE.MathUtils.clamp(gesturePointA.distanceTo(gesturePointB) / xrGlobeGesture.distance, 0.35, 3);
      const targetScale = THREE.MathUtils.clamp(xrGlobeGesture.globeScale.x * scaleFactor, 0.45, 2.5);
      const appliedFactor = targetScale / xrGlobeGesture.globeScale.x;
      const offset = xrGlobeGesture.globePosition.clone().sub(xrGlobeGesture.midpoint).multiplyScalar(appliedFactor);
      globeGroup.position.copy(gestureMidpoint).add(offset);
      globeGroup.scale.setScalar(targetScale);
    }

    function updateRotationButtonPosition() {
      const scale = globeGroup.scale.x;
      rotateButtonOffset.set(0.82 * scale, -0.48 * scale, 0.08);
      rotateButton.position.copy(globeGroup.position).add(rotateButtonOffset);
      camera.getWorldPosition(panelCameraPosition);
      rotateButton.lookAt(panelCameraPosition);
      rotateButton.scale.setScalar(THREE.MathUtils.clamp(0.8 + scale * 0.2, 0.8, 1.3));
    }

    function updateFingerCollisions(time) {
      if (!renderer.xr.isPresenting || time - lastFingerCheck < 100) return;
      lastFingerCheck = time;
      globeGroup.updateMatrixWorld(true);
      xrHands.forEach((hand, handIndex) => {
        const tip = hand.joints?.['index-finger-tip'];
        if (!tip?.visible) return;
        tip.getWorldPosition(fingerPoint);

        const voiceTarget = xrVoice.fingerTargetAt(fingerPoint);
        const previousVoiceTarget = voiceFingerTargets.get(handIndex) || null;
        if (voiceTarget && voiceTarget !== previousVoiceTarget) {
          xrVoice.handleObject(voiceTarget, `finger-${handIndex}`);
        }
        voiceFingerTargets.set(handIndex, voiceTarget);
        if (voiceTarget) return;

        let panelRegion = -1;
        if (detailsPanel.visible) {
          detailsSurface.updateMatrixWorld(true);
          detailsSurface.worldToLocal(panelLocalPoint.copy(fingerPoint));
          if (Math.abs(panelLocalPoint.z) < 0.035 && Math.abs(panelLocalPoint.x) <= 0.36 && Math.abs(panelLocalPoint.y) <= 0.45) {
            const canvasX = (panelLocalPoint.x / 0.72 + 0.5) * detailsCanvas.width;
            const canvasY = (0.5 - panelLocalPoint.y / 0.9) * detailsCanvas.height;
            panelRegion = panelHitRegions.findIndex((item) => canvasX >= item.x && canvasX <= item.x + item.width && canvasY >= item.y && canvasY <= item.y + item.height);
          }
        }
        const previousPanelRegion = panelFingerTargets.get(handIndex) ?? -1;
        if (panelRegion >= 0 && panelRegion !== previousPanelRegion) handlePanelAction(panelHitRegions[panelRegion].action);
        panelFingerTargets.set(handIndex, panelRegion);

        rotateButton.updateMatrixWorld(true);
        rotateButton.worldToLocal(rotateLocalPoint.copy(fingerPoint));
        const overRotate = Math.abs(rotateLocalPoint.z) < 0.035 && Math.abs(rotateLocalPoint.x) <= 0.135 && Math.abs(rotateLocalPoint.y) <= 0.05625;
        const wasOverRotate = rotateFingerTargets.get(handIndex) || false;
        if (overRotate && !wasOverRotate) toggleGlobeRotation(`finger-${handIndex}`);
        rotateFingerTargets.set(handIndex, overRotate);

        if (panelRegion >= 0 || overRotate) return;
        let nearest = -1;
        let nearestDistance = 0.035;
        markerPositions.forEach((position, markerIndex) => {
          markerWorldPoint.copy(position).applyMatrix4(globeGroup.matrixWorld);
          const distance = markerWorldPoint.distanceTo(fingerPoint);
          if (distance < nearestDistance) {
            nearest = markerIndex;
            nearestDistance = distance;
          }
        });
        const previous = fingerTargets.get(handIndex) ?? -1;
        if (nearest >= 0 && nearest !== previous) activateCluster(nearest, `finger-${handIndex}`);
        fingerTargets.set(handIndex, nearest);
      });
    }

    setupController(0);
    setupController(1);
    setupHand(0);
    setupHand(1);

    scene.add(new THREE.HemisphereLight(0xc6f1ff, 0x101827, 2.4));
    const key = new THREE.DirectionalLight(0xffffff, 2.8);
    key.position.set(2, 3, 2);
    scene.add(key);

    status.textContent = fleet.clusters.length
      ? `${Number(fleet.mappedAircraft).toLocaleString()} mapped aircraft · ${fleet.clusters.length} locations`
      : 'No cached fleet data. Return to the dashboard and load Fleet Context first.';

    renderer.xr.addEventListener('sessionstart', () => {
      detailsTarget = 0;
      xrVoice.setPresenting(true);
      status.textContent = `${Number(fleet.mappedAircraft).toLocaleString()} mapped aircraft in VR`;
    });
    renderer.xr.addEventListener('sessionend', () => {
      detailsTarget = 0;
      xrVoice.setPresenting(false);
      xrActiveGrips.clear();
      xrGlobeGesture = null;
      scene.attach(detailsPanel);
      detailsPanel.position.copy(panelWorldPosition);
      detailsPanel.quaternion.copy(panelWorldQuaternion);
      status.textContent = 'VR session ended';
    });

    const clock = new THREE.Clock();
    renderer.setAnimationLoop((time) => {
      const delta = clock.getDelta();
      if (rotationEnabled) globeGroup.rotation.y += delta * 0.035;
      updateGlobeGesture();
      updateRotationButtonPosition();
      updateDetailsPresentation(delta);
      updateFingerCollisions(time);
      const rightWrist = rightHand?.joints?.wrist;
      xrVoice.update(delta, time, {
        anchor: rightWrist?.visible ? rightWrist : rightController,
        camera
      });
      renderer.render(scene, camera);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
