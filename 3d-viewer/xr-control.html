<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MXGenius WebXR Control</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #080c14; color: #eef6ff; font-family: system-ui, sans-serif; }
    canvas { display: block; width: 100%; height: 100%; }
    #status { position: fixed; top: 16px; left: 16px; z-index: 2; max-width: min(520px, calc(100vw - 32px)); padding: 12px 14px; border: 1px solid #1d5770; border-radius: 8px; background: rgba(5, 12, 22, 0.88); font: 13px/1.45 ui-monospace, monospace; }
    #status strong { color: #23d5ff; }
    #status-detail { color: #9fb3c8; margin-top: 4px; }
    #VRButton { opacity: 1 !important; background: #073c51 !important; border-color: #23d5ff !important; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "./lib/three.module.js",
      "three/addons/": "./lib/"
    }
  }
  </script>
</head>
<body>
  <div id="status">
    <strong id="status-label">Initializing control scene</strong>
    <div id="status-detail">Standalone Three.js scene; no application shell, model loader, or post-processing.</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    const statusLabel = document.getElementById('status-label');
    const statusDetail = document.getElementById('status-detail');
    const setStatus = (label, detail) => {
      statusLabel.textContent = label;
      statusDetail.textContent = detail;
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080c14);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 50);
    camera.position.set(0, 1.6, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(VRButton.createButton(renderer));

    const room = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(6, 3, 6)),
      new THREE.LineBasicMaterial({ color: 0x24566b })
    );
    room.position.set(0, 1.5, -2);
    scene.add(room);

    const floor = new THREE.GridHelper(6, 12, 0x23d5ff, 0x173345);
    floor.position.z = -2;
    scene.add(floor);

    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 0.5, 0.5),
      new THREE.MeshStandardMaterial({ color: 0x23d5ff, roughness: 0.35, metalness: 0.15 })
    );
    cube.position.set(0, 1.6, -2);
    scene.add(cube);

    scene.add(new THREE.HemisphereLight(0xbdeeff, 0x18202b, 2.2));
    const key = new THREE.DirectionalLight(0xffffff, 2.5);
    key.position.set(2, 4, 1);
    scene.add(key);

    renderer.xr.addEventListener('sessionstart', () => {
      setStatus('XR session started', 'The browser handed rendering to the headset. A cyan cube should be two meters ahead.');
    });
    renderer.xr.addEventListener('sessionend', () => {
      setStatus('XR session ended', 'The control returned cleanly to the browser.');
    });

    window.addEventListener('error', (event) => {
      setStatus('JavaScript error', event.message || 'Unknown error');
    });
    window.addEventListener('unhandledrejection', (event) => {
      const reason = event.reason;
      setStatus('Promise rejection', reason?.message || String(reason));
    });
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      cube.rotation.y += clock.getDelta() * 0.65;
      renderer.render(scene, camera);
    });

    setStatus('Control scene ready', 'Click ENTER VR. This page exercises only Three.js WebXR and a primitive scene.');
  </script>
</body>
</html>
