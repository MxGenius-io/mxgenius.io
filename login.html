<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MXGenius</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        
        .login-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-sub {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }
        
        h1 {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 8px;
        }
        
        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #cbd5e1;
            margin-bottom: 8px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-size: 14px;
            color: #f8fafc;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
        }
        
        input::placeholder {
            color: #475569;
        }
        
        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .remember-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #60a5fa;
        }
        
        .remember-row label {
            font-size: 13px;
            color: #94a3b8;
            margin: 0;
            cursor: pointer;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.5);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error-message.visible {
            display: block;
        }
        
        .demo-credentials {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .demo-credentials h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 12px;
        }
        
        .demo-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        
        .demo-row span:first-child {
            color: #64748b;
        }
        
        .demo-row code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(15, 23, 42, 0.6);
            padding: 2px 6px;
            border-radius: 4px;
            color: #a5b4fc;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #475569;
        }
        
        .footer a {
            color: #60a5fa;
            text-decoration: none;
        }
        
        .oauth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #475569;
            font-size: 12px;
            text-transform: uppercase;
        }
        .oauth-divider::before, .oauth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .oauth-divider:not(:empty)::before { margin-right: .5em; }
        .oauth-divider:not(:empty)::after { margin-left: .5em; }
        
        .oauth-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }
        .oauth-btn:hover { background: rgba(255,255,255,0.1); }
    </style>
    
    <!-- Microsoft MSAL -->
    <script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-text">MXgenius</div>
                <div class="logo-sub">Aviation Maintenance Platform</div>
            </div>
            
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to your account</p>
            
            <div id="errorMessage" class="error-message"></div>
            
            <button class="oauth-btn" id="btn-microsoft">
                <svg width="18" height="18" viewBox="0 0 21 21" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 0H0V10H10V0Z" fill="#f25022"/><path d="M21 0H11V10H21V0Z" fill="#7fba00"/><path d="M10 11H0V21H10V11Z" fill="#00a4ef"/><path d="M21 11H11V21H21V11Z" fill="#ffb900"/></svg>
                Sign in with Microsoft
            </button>
            <button class="oauth-btn" id="btn-google">
                <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Sign in with Google
            </button>
            
            <div class="oauth-divider">or continue with email</div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                
                <div class="remember-row">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me for 7 days</label>
                </div>
                
                <button type="submit" class="btn-login" id="loginBtn">
                    Sign In
                </button>
            </form>
            
            <div class="demo-credentials">
                <h3>Demo Credentials</h3>
                <div class="demo-row">
                    <span>Email:</span>
                    <code>admin@mxgenius.local</code>
                </div>
                <div class="demo-row">
                    <span>Password:</span>
                    <code>admin123</code>
                </div>
            </div>
            
            <div class="footer">
                Powered by <a href="#">MXgenius</a> | <a href="#">Need Help?</a>
            </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span> Signing in...';
            errorMessage.classList.remove('visible');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password, remember })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }
                
                // Store auth state
                localStorage.setItem('mx_auth', JSON.stringify({
                    user: data.user,
                    token: data.token,
                    expiresAt: data.expiresAt
                }));
                
                // Redirect to main app
                window.location.href = '/';
                
            } catch (error) {
                errorMessage.textContent = error.message;
                errorMessage.classList.add('visible');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Sign In';
            }
        });
        
        // OAuth Config from HermeticLabs
        const MSAL_CLIENT_ID = '17a0f6b6-4285-4272-af72-3bbbd2937973';
        const GOOGLE_CLIENT_ID = '311078548827-26uctc9qb8rdsu4kidn5tmek37ivsttq.apps.googleusercontent.com';
        
        // --- Microsoft MSAL Setup ---
        const msalConfig = {
            auth: {
                clientId: MSAL_CLIENT_ID,
                authority: 'https://login.microsoftonline.com/common',
                redirectUri: window.location.origin
            }
        };
        const msalInstance = new msal.PublicClientApplication(msalConfig);
        
        document.getElementById('btn-microsoft').addEventListener('click', async () => {
            try {
                const response = await msalInstance.loginPopup({ scopes: ["user.read"] });
                console.log("MSAL Success:", response.idToken);
                await sendTokenToBackend(response.idToken, '/auth/microsoft');
            } catch(e) {
                console.error(e);
                showError('Microsoft authentication failed');
            }
        });
        
        // --- Google Setup ---
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: async (response) => {
                    console.log("Google Success:", response.credential);
                    await sendTokenToBackend(response.credential, '/auth/google');
                }
            });
            document.getElementById('btn-google').addEventListener('click', () => {
                google.accounts.id.prompt();
            });
        };
        
        async function sendTokenToBackend(token, endpoint) {
            try {
                const liveApi = 'https://mxg-api.kindbush-8fee3a17.centralus.azurecontainerapps.io';
                const res = await fetch(liveApi + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                const data = await res.json();
                if(data.session_token) {
                    localStorage.setItem('mx_auth', JSON.stringify({ token: data.session_token }));
                    window.location.href = 'dashboard.html';
                } else {
                    showError('Failed to create session');
                }
            } catch(e) {
                showError('Backend communication error');
            }
        }
        
        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.add('visible');
        }

        // Auto-fill demo credentials
        document.getElementById('email').value = 'admin@mxgenius.local';
        document.getElementById('password').value = 'admin123';
    </script>
</body>
</html>
