<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MXGenius</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
        }
        
        .login-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }
        
        .login-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        
        .logo-text {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-sub {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
            margin-bottom: 32px;
        }

        .lock-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lock-icon svg {
            width: 32px;
            height: 32px;
        }
        
        h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .message {
            color: #94a3b8;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .cta-button {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            transition: all 0.2s;
            margin-bottom: 16px;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4);
        }

        .contact-link {
            display: block;
            color: #60a5fa;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .contact-link:hover {
            color: #93c5fd;
        }
        
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #475569;
        }
        
        .footer a {
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-text">MXgenius</div>
            <div class="logo-sub">Aviation Maintenance Platform</div>

            <div class="lock-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <h1>Platform Access</h1>
            <p class="message">
                Sign in with your organization’s Microsoft account to open the operations dashboard.
            </p>
            
            <button type="button" class="cta-button" data-entra-signin disabled>Sign in with Microsoft</button>
            <a href="index.html" class="contact-link">Return to Homepage</a>
            <a href="waitlist.html" class="contact-link">Request early access →</a>
            
            <div class="footer" style="margin-top: 32px;">
                Powered by <a href="index.html">MXgenius</a> | <a href="trust-center.html">Trust Center</a>
            </div>
        </div>
    </div>
    <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js" crossorigin="anonymous"></script>
    <script src="runtime-config.js?v=5"></script>
    <script src="auth.js?v=3"></script>
</body>
</html>
