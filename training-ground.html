<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MxGenius Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    :root {
      --bg-primary: #0a0a0f;
      --bg-surface: #12121a;
      --bg-elevated: #1a1a24;
      --bg-card: #20202a;
      --border: rgba(59, 130, 246, 0.15);
      --border-focus: #3b82f6;
      --text-primary: #ffffff;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --accent-teal: #3b82f6;
      --accent-teal-dim: rgba(59, 130, 246, 0.15);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent-teal), #2563eb);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700;
    }
    .logo-text h1 { font-size: 16px; font-weight: 600; }
    .logo-text span { font-size: 10px; color: var(--text-secondary); }

    .header-actions { display: flex; gap: 1rem; }
    .action-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex; align-items: center; gap: 0.5rem;
      transition: all 0.2s;
    }
    .action-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); border-color: var(--accent-teal); }

    /* Main Chat Layout */
    .main-container {
      display: flex;
      flex: 1;
      height: calc(100vh - 65px);
    }

    .sidebar {
      width: 260px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar.collapsed {
      width: 0;
      padding-left: 0;
      padding-right: 0;
      border-right: none;
    }
    .sidebar.collapsed > * {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .sidebar > * {
      opacity: 1;
      transition: opacity 0.3s 0.1s;
    }
    .history-list {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow-y: auto;
    }
    .history-item {
      padding: 0.75rem;
      border-radius: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .history-item:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-primary);
    }
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    
    .message { display: flex; gap: 1rem; max-width: 800px; margin: 0 auto; width: 100%; }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 36px; height: 36px; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: rgba(255,255,255,0.1); }
    .message.assistant .avatar { background: linear-gradient(135deg, var(--accent-teal), #2563eb); }
    .message-content {
      background: var(--bg-elevated);
      padding: 1rem 1.25rem;
      border-radius: 0.75rem;
      border: 1px solid var(--border);
      font-size: 0.95rem;
    }
    .message.user .message-content { background: rgba(255,255,255,0.05); border-bottom-right-radius: 0.25rem; }
    .message.assistant .message-content { border-bottom-left-radius: 0.25rem; }

    .input-container { padding: 1.5rem 2rem; background: linear-gradient(to top, var(--bg-primary) 50%, transparent); }
    .input-box {
      max-width: 800px; margin: 0 auto;
      display: flex; align-items: center;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 1rem; padding: 0.5rem;
    }
    .input-box:focus-within { border-color: var(--accent-teal); box-shadow: 0 0 0 2px var(--accent-teal-dim); }
    textarea {
      flex: 1; background: transparent; border: none; color: var(--text-primary);
      padding: 0.75rem 1rem; font-family: inherit; font-size: 0.95rem; resize: none; height: 48px; outline: none;
    }
    .submit-btn { background: var(--text-primary); color: var(--bg-primary); border: none; width: 36px; height: 36px; border-radius: 0.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .submit-btn:hover { transform: scale(1.05); }

    .starters {
      display: flex; gap: 0.75rem; max-width: 800px; margin: 0.5rem auto 0; flex-wrap: wrap;
    }
    .starter-btn {
      background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.2);
      color: var(--accent-teal); padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.85rem;
      cursor: pointer; transition: all 0.2s;
    }
    .starter-btn:hover { background: rgba(59, 130, 246, 0.2); border-color: var(--accent-teal); }
    
    /* User Profile & Modal */
    .sidebar { position: relative; }
    .user-profile-area {
      margin-top: auto;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .profile-btn {
      width: 100%;
      background: rgba(59, 130, 246, 0.1);
      color: var(--accent-teal);
      border: 1px solid rgba(59, 130, 246, 0.2);
      padding: 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      text-align: center;
    }
    .profile-btn:hover { background: rgba(59, 130, 246, 0.2); }
    .user-info { display: flex; align-items: center; gap: 12px; width: 100%; }
    .user-avatar {
      width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
      background: var(--bg-card); display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--border);
    }
    .user-details { flex: 1; overflow: hidden; }
    .user-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-logout { font-size: 0.75rem; color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
    .user-logout:hover { color: #f87171; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center; z-index: 1000;
      opacity: 0; transition: opacity 0.3s;
    }
    .modal-overlay.active { display: flex; opacity: 1; }
    .modal-content {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 1rem;
      width: 100%; max-width: 400px;
      padding: 2rem;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      transform: translateY(20px); transition: transform 0.3s;
    }
    .modal-overlay.active .modal-content { transform: translateY(0); }
    .modal-header { margin-bottom: 1.5rem; text-align: center; }
    .modal-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .modal-header p { color: var(--text-secondary); font-size: 0.9rem; }
    
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
    .form-input {
      width: 100%; background: var(--bg-primary); border: 1px solid var(--border);
      color: var(--text-primary); padding: 0.75rem 1rem; border-radius: 0.5rem; outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent-teal); }
    
    .dropzone {
      border: 2px dashed var(--border); border-radius: 50%;
      width: 100px; height: 100px; margin: 0 auto 1.5rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; overflow: hidden; position: relative;
      transition: all 0.2s; background: var(--bg-primary);
    }
    .dropzone:hover, .dropzone.dragover { border-color: var(--accent-teal); background: rgba(59, 130, 246, 0.05); }
    .dropzone img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; }
    .dropzone.has-image img { display: block; }
    .dropzone.has-image svg { display: none; }
    .dropzone input { display: none; }
    
    .btn-primary {
      width: 100%; background: var(--accent-teal); color: #fff; border: none;
      padding: 0.85rem; border-radius: 0.5rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .btn-primary:hover { background: #2563eb; }
    .close-modal {
      position: absolute; top: 1rem; right: 1rem; background: transparent; border: none;
      color: var(--text-muted); cursor: pointer; padding: 0.25rem;
    }
    .close-modal:hover { color: var(--text-primary); }
  </style>
</head>
<body>

<header class="header">
  <div class="header-content">
    <div style="display: flex; align-items: center; gap: 16px;">
      <button class="action-btn" onclick="toggleSidebar()" style="border: none; padding: 0.5rem; margin-right: -8px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <a href="index.html" style="text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; padding: 6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back
      </a>
      <div class="logo">
        <img src="assets/mxgenius_logo.png" style="width: 40px; height: 40px; border-radius: 10px; object-fit: cover;">
        <div class="logo-text">
          <h1>MxGenius</h1>
          <span>Chat</span>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="main-container">
  <div class="sidebar" id="appSidebar">
    <button class="action-btn" style="width: 100%; justify-content: center; color: var(--text-primary);">+ New Chat</button>
    <div class="history-list">
      <!-- Chat history will appear here -->
    </div>
    
    <div class="user-profile-area" id="userProfileArea">
      <!-- Rendered via JS -->
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-container" id="chatContainer">
      <div class="message assistant">
        <div class="avatar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></div>
        <div class="message-content">
          Hello! I'm MxGenius. How can I help you troubleshoot today? Describe an issue to get a MxGenius Advisory.
          <div id="getStartedChatBtn" style="margin-top: 1rem; display: none;">
            <button class="profile-btn" onclick="openAuthModal()" style="width: auto; padding: 0.5rem 1.5rem; border-radius: 2rem;">Get Started (Create Profile)</button>
          </div>
        </div>
      </div>
      <div class="starters" id="startersContainer">
        <button class="starter-btn" onclick="useStarter('APU is auto-shutdown with fault light illuminated')">APU is auto-shutdown with fault light illuminated</button>
        <button class="starter-btn" onclick="useStarter('Hydraulic system B pressure low during gear retraction')">Hydraulic system B pressure low during gear retraction</button>
        <button class="starter-btn" onclick="useStarter('Engine 1 EGT running hot during climb')">Engine 1 EGT running hot during climb</button>
      </div>
    </div>

    <div class="input-container">
      <div class="input-box">
        <textarea id="chatInput" placeholder="Message MXGenius..." rows="1"></textarea>
        <button class="submit-btn" id="sendBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </div>
  </div>
</main>

<script>



        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatContainer = document.getElementById('chatContainer');
        const startersContainer = document.getElementById('startersContainer');

        function useStarter(text) {
            chatInput.value = text;
            handleSend();
        }

        function addMessage(text, isUser = false) {
            if (startersContainer) startersContainer.style.display = 'none';
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            const avatarHtml = isUser 
                ? `<div class="avatar"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>`
                : `<div class="avatar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></div>`;
                
            msgDiv.innerHTML = `
                ${avatarHtml}
                <div class="message-content">${text}</div>
            `;
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }



        async function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            chatInput.value = '';
            
            try {
                const response = await fetch('https://mxg-api.kindbush-8fee3a17.centralus.azurecontainerapps.io/chat', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer mxg_dev_token_123'
                    },
                    body: JSON.stringify({ message: text })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.error) {
                        addMessage("System Error: " + data.error + " | Raw: " + JSON.stringify(data.raw));
                        return;
                    }
                    
                    if (!data.synthesis) {
                        addMessage(JSON.stringify(data), false);
                        return;
                    }
                    
                    let content = `<div style="font-family: monospace; font-size: 0.9em; line-height: 1.5; color: var(--text-light-gray);">`;
                    content += `<h3 style="color: var(--accent-teal); margin-bottom: 0.25rem;">Advisory</h3>`;
                    
                    content += `<h4 style="color: var(--text-secondary); margin-top: 1rem; margin-bottom: 0.25rem; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em;">SYNTHESIS FROM SIMILAR HISTORICAL WORK</h4>`;
                    content += `<p style="margin-top: 0; color: var(--text-primary);">${data.synthesis}</p>`;
                    
                    content += `<h4 style="color: var(--text-secondary); margin-top: 1rem; margin-bottom: 0.25rem; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em;">MXGENIUS RECOMMENDS</h4>`;
                    content += `<p style="margin-top: 0; color: var(--text-primary);">${data.mxgenius_recommends}</p>`;
                    
                    content += `<h4 style="color: #f87171; margin-top: 1rem; margin-bottom: 0.25rem; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em;">VERIFY FIRST</h4>`;
                    content += `<p style="margin-top: 0; color: var(--text-primary);">${data.verify_first}</p>`;
                    
                    content += `<h4 style="color: #fbbf24; margin-top: 1rem; margin-bottom: 0.25rem; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em;">MOST LIKELY CAUSE</h4>`;
                    content += `<p style="margin-top: 0; color: var(--text-primary);">${data.most_likely_cause}</p>`;
                    
                    if (data.what_worked && data.what_worked.length > 0) {
                        content += `<h4 style="color: var(--text-secondary); margin-top: 1rem; margin-bottom: 0.25rem; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em;">WHAT WORKED</h4>`;
                        content += `<ul style="margin-top: 0; padding-left: 1.25rem; color: var(--text-primary);">`;
                        for (const item of data.what_worked) {
                            content += `<li>${item}</li>`;
                        }
                        content += `</ul>`;
                    }
                    
                    if (data.parts_and_references && data.parts_and_references.length > 0) {
                        content += `<h4 style="color: var(--text-secondary); margin-top: 1rem; margin-bottom: 0.25rem; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em;">PARTS & REFERENCES</h4>`;
                        content += `<ul style="margin-top: 0; padding-left: 1.25rem; color: var(--text-primary);">`;
                        for (const item of data.parts_and_references) {
                            content += `<li>${item}</li>`;
                        }
                        content += `</ul>`;
                    }
                    
                    if (data.labor_by_action && data.labor_by_action.length > 0) {
                        content += `<h4 style="color: var(--text-secondary); margin-top: 1rem; margin-bottom: 0.25rem; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em;">LABOR BY ACTION</h4>`;
                        content += `<ul style="margin-top: 0; padding-left: 1.25rem; color: var(--text-primary);">`;
                        for (const item of data.labor_by_action) {
                            content += `<li>${item}</li>`;
                        }
                        content += `</ul>`;
                    }
                    
                    if (data.parts_used_in_these_records && data.parts_used_in_these_records.length > 0) {
                        content += `<h4 style="color: var(--text-secondary); margin-top: 1rem; margin-bottom: 0.25rem; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.05em;">PARTS USED IN THESE RECORDS</h4>`;
                        content += `<ul style="margin-top: 0; padding-left: 1.25rem; color: var(--text-primary);">`;
                        for (const item of data.parts_used_in_these_records) {
                            content += `<li>${item}</li>`;
                        }
                        content += `</ul>`;
                    }
                    
                    if (data.matching_records && data.matching_records.length > 0) {
                        content += `<h4 style="color: #34d399; margin-top: 1.5rem; margin-bottom: 0.5rem; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); padding-bottom: 0.25rem;">Matching Records (${data.matching_records.length} RECORDS)</h4>`;
                        data.matching_records.forEach((record, index) => {
                            content += `<div style="background: var(--bg-surface); padding: 1rem; border-radius: 0.5rem; margin-bottom: 1rem; border: 1px solid var(--border);">`;
                            content += `<div style="color: var(--text-secondary); font-size: 0.85em; margin-bottom: 0.5rem;">[${index + 1}] ${record.date} &middot; ${record.record_type} &middot; ATA ${record.ata} &middot; ${record.model} &middot; ${record.labor_hours} &middot; ${record.match_score} match</div>`;
                            content += `<div style="color: var(--text-primary); font-weight: 600; margin-bottom: 0.5rem;">${record.title}</div>`;
                            content += `<div style="margin-bottom: 0.5rem; color: var(--text-primary);"><strong>Resolution:</strong> ${record.resolution}</div>`;
                            content += `<div style="color: var(--text-secondary); font-size: 0.9em;"><strong>Notes:</strong><br>${record.notes}</div>`;
                            content += `</div>`;
                        });
                    }
                    
                    content += `</div>`;
                    addMessage(content, false);
                } else {
                    addMessage("System Error: Failed to get response from server.");
                }
            } catch (err) {
                addMessage("System Error: API is offline. Is the backend running?");
            }
        }

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

</script>

<!-- Auth Modal -->
<div class="modal-overlay" id="authModal">
  <div class="modal-content" style="position: relative;">
    <button class="close-modal" onclick="closeAuthModal()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <div class="modal-header">
      <h2>Create Profile</h2>
      <p>Identify yourself to save memory & history</p>
    </div>
    <form id="authForm" onsubmit="handleAuthSubmit(event)">
      <div class="dropzone" id="avatarDropzone" onclick="document.getElementById('avatarInput').click()">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <img id="avatarPreview" src="" alt="Avatar Preview">
        <input type="file" id="avatarInput" accept="image/*" onchange="handleAvatarSelect(event)">
      </div>
      
      <div class="form-group">
        <label for="userName">Full Name</label>
        <input type="text" id="userName" class="form-input" placeholder="e.g. John Doe" required>
      </div>
      <div class="form-group">
        <label for="userEmail">Email Address</label>
        <input type="email" id="userEmail" class="form-input" placeholder="john@example.com" required>
      </div>
      
      <button type="submit" class="btn-primary">Save Profile</button>
    </form>
  </div>
</div>

<script>
    // --- AUTH & PROFILE LOGIC ---
    let currentUser = JSON.parse(localStorage.getItem('mxgenius_user')) || null;
    let selectedAvatarBase64 = null;

    function renderProfileArea() {
        const profileArea = document.getElementById('userProfileArea');
        const getStartedBtn = document.getElementById('getStartedChatBtn');
        if (currentUser) {
            if (getStartedBtn) getStartedBtn.style.display = 'none';
            profileArea.innerHTML = `
                <div class="user-info">
                    <img src="${currentUser.avatar || 'assets/default_avatar.png'}" class="user-avatar" alt="Avatar" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'40\\' height=\\'40\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'white\\' stroke-width=\\'2\\'><path d=\\'M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2\\'/><circle cx=\\'12\\' cy=\\'7\\' r=\\'4\\'/></svg>'">
                    <div class="user-details">
                        <div class="user-name">${currentUser.name}</div>
                        <div class="user-logout" onclick="handleLogout()">Sign Out</div>
                    </div>
                </div>
            `;
        } else {
            if (getStartedBtn) getStartedBtn.style.display = 'block';
            profileArea.innerHTML = `
                <button class="profile-btn" onclick="openAuthModal()">Sign Up / Log In</button>
            `;
        }
    }

    function toggleSidebar() {
        document.getElementById('appSidebar').classList.toggle('collapsed');
    }

    function openAuthModal() {
        document.getElementById('authModal').classList.add('active');
    }

    function closeAuthModal() {
        document.getElementById('authModal').classList.remove('active');
        document.getElementById('authForm').reset();
        document.getElementById('avatarDropzone').classList.remove('has-image');
        selectedAvatarBase64 = null;
    }

    function handleAvatarSelect(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                selectedAvatarBase64 = e.target.result;
                document.getElementById('avatarPreview').src = selectedAvatarBase64;
                document.getElementById('avatarDropzone').classList.add('has-image');
            }
            reader.readAsDataURL(file);
        }
    }

    // Handle drag and drop for avatar
    const dropzone = document.getElementById('avatarDropzone');
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
            document.getElementById('avatarInput').files = e.dataTransfer.files;
            handleAvatarSelect({ target: document.getElementById('avatarInput') });
        }
    });

    function handleAuthSubmit(event) {
        event.preventDefault();
        const name = document.getElementById('userName').value.trim();
        const email = document.getElementById('userEmail').value.trim();
        
        currentUser = {
            id: 'usr_' + Math.random().toString(36).substr(2, 9), // Mock ID
            name,
            email,
            avatar: selectedAvatarBase64
        };
        
        localStorage.setItem('mxgenius_user', JSON.stringify(currentUser));
        renderProfileArea();
        closeAuthModal();
        
        // Notify chat area
        addMessage(`Welcome, ${name}! Your identity is now established. Your thread history and context will be tracked (UI container ready).`, false);
    }

    function handleLogout() {
        currentUser = null;
        localStorage.removeItem('mxgenius_user');
        renderProfileArea();
    }

    // Initialize UI
    renderProfileArea();
</script>

</body>
</html>
